services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: servicetracker
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: servicetracker_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicetracker"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
